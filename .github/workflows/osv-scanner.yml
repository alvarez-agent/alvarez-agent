name: OSV-Scanner

# Scans lockfiles (uv.lock, package-lock.json) against the OSV vulnerability
# database. Runs on every PR/push (via the ci.yml orchestrator's workflow_call)
# and on a weekly schedule against main.
#
# This is detection-only — OSV-Scanner does NOT open PRs or modify pins.
# It reports known CVEs in currently-pinned dependency versions so we can
# decide when and how to patch on our own schedule. Our pinning strategy
# (full SHA / exact version) is preserved; only the notification signal
# is added.
#
# Complements the supply-chain-audit.yml workflow (which scans for malicious
# code patterns in PR diffs) by covering the orthogonal "currently-pinned
# dep became known-vulnerable" case.
#
# Uses Google's officially-recommended reusable workflow, pinned by SHA.
# SARIF upload to the Security tab needs GitHub Advanced Security, which
# isn't available on this private repo — see the upload-sarif note below.
# Findings are visible in the job log only; fail-on-vuln is disabled so the
# job does not block merges on pre-existing vulnerabilities in pinned deps
# that we may need to patch deliberately.

on:
  workflow_call:
  schedule:
    # Weekly scan against main — catches CVEs published after merge for
    # deps that haven't changed since.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  # google/osv-scanner-action's reusable workflow declares these three scopes
  # unconditionally in its own top-level `permissions:`, regardless of the
  # upload-sarif input. GitHub validates the whole reusable-workflow call
  # chain before starting any job, so granting anything less than this here
  # (or in ci.yml, which caps what this file can pass down) makes the entire
  # run fail with startup_failure and zero jobs — not just skip SARIF upload.
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan lockfiles
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # Scan explicit lockfiles rather than recursing, so we only look at
      # the three sources of truth and skip vendored / test / worktree dirs.
      scan-args: |-
        --lockfile=uv.lock
        --lockfile=package-lock.json
      fail-on-vuln: false
      # SARIF upload needs code scanning, which requires GitHub Advanced
      # Security on private repos. Findings still appear in the job log.
      # Re-enable if the repo goes public or GHAS is purchased.
      upload-sarif: false
